# Local backends for the opt-in storage integration suite
# (`uv run pytest -m integration`). MinIO serves the S3 (and, by S3-compat, the
# R2 backend's LCD) code path; Azurite serves Azure Blob. MinIO CANNOT reproduce
# the real Cloudflare R2 checksum landmine — that risk is covered by the
# config-introspection unit test in test_s3_backend.py, not here.
#
# No Redis this phase (ADR-0011 defers the task queue and its Redis dependency).
#
#   docker compose -f docker-compose.test.yml up -d
#   uv run pytest -m integration
#   docker compose -f docker-compose.test.yml down -v

services:
  minio:
    image: minio/minio:latest
    command: server /data --address ":9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    healthcheck:
      # MinIO ships a liveness probe via the `mc ready` command.
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 20

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    ports:
      - "10000:10000"
    healthcheck:
      # A TCP open on the blob port is enough. Probe 127.0.0.1 explicitly, NOT
      # `localhost`: inside the image `localhost` resolves to ::1 first, but
      # Azurite binds IPv4 0.0.0.0 — so a `localhost` probe gets connection-refused
      # and the container falsely reports unhealthy.
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 3s
      timeout: 5s
      retries: 20

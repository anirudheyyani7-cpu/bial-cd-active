# Local Postgres 18 + pgvector for the control-plane. PG18 ships uuidv7()
# natively (UUIDv7 PK server default, ADR-0006); the pgvector image adds the
# `vector` extension the initial migration enables (ADR-0013).
#
# Fallback if the pg18 tag is unavailable: use `postgres:18` and build/install
# pgvector, or pin `pgvector/pgvector:pg17` (uuidv7() then needs the app-side
# uuid.uuid7() default only — the server_default line would need dropping).
services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: bial
      POSTGRES_PASSWORD: bial
      POSTGRES_DB: bial
    ports:
      # Host 5544 (5432 is often taken by another local Postgres); container is 5432.
      - "5544:5432"
    volumes:
      # PG18+ images store data in a major-version subdir; the mount goes at
      # /var/lib/postgresql (NOT /data) — see docker-library/postgres#1259.
      - bial_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bial -d bial"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  bial_pgdata:
